<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to your Mountain Expedition account.">
  <title>Login - Mountain Expedition</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap"
    rel="stylesheet">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
</head>

<body class="d-flex flex-column min-vh-100">



  <!-- Login Section -->
  <main class="flex-grow-1 d-flex align-items-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
          <div class="card p-4">
            <div class="text-center mb-4">
              <a href="index.html"
                class="d-flex align-items-center justify-content-center gap-2 mb-3 text-decoration-none">
                <img src="assets/images/logo.svg" alt="Logo" style="height: 40px;">
                <span class="fw-bold text-primary"
                  style="font-size: 1.15rem; font-family: 'Montserrat', sans-serif;">Mountain Expedition</span>
              </a>
              <h2 class="mb-2">Welcome Back</h2>
              <p class="text-secondary">Log in to manage your expeditions</p>
            </div>

            <form data-validate>
              <div class="form-group mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
              </div>

              <div class="form-group mb-4">
                <div class="d-flex justify-content-between align-items-center mb-2">
                  <label for="password" class="form-label mb-0">Password</label>
                </div>
                <input type="password" id="password" class="form-control" placeholder="Enter your password" required
                  minlength="8">
                <div class="mt-2 text-end">
                  <a href="#" class="text-primary small fw-semibold">Forgot password?</a>
                </div>
              </div>

              <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" value="" id="remember">
                <label class="form-check-label" for="remember">
                  Remember me
                </label>
              </div>

              <button type="submit" class="btn btn-primary w-100 py-3 mb-3">Login</button>

              <div class="text-center mb-3">
                <span class="text-secondary small fw-medium">OR</span>
              </div>

              <div class="d-grid gap-2 mb-4">
                <button type="button"
                  class="btn btn-outline w-100 d-flex align-items-center justify-content-center gap-2">
                  <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="Google">
                  Continue with Google
                </button>
                <button type="button"
                  class="btn btn-outline w-100 d-flex align-items-center justify-content-center gap-2"
                  style="border-color: #1877f2; color: #1877f2;">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
                    viewBox="0 0 16 16">
                    <path
                      d="M16 8.049c0-4.446-3.582-8.05-8-8.05C3.58 0-.002 3.603-.002 8.05c0 4.017 2.926 7.347 6.75 7.951v-5.625h-2.03V8.05H6.75V6.275c0-2.017 1.195-3.131 3.022-3.131.876 0 1.791.157 1.791.157v1.98h-1.009c-.993 0-1.303.621-1.303 1.258v1.51h2.218l-.354 2.326H9.25V16c3.824-.604 6.75-3.934 6.75-7.951z" />
                  </svg>
                  Continue with Facebook
                </button>
              </div>

              <div class="text-center mt-3">
                <p class="mb-0">Don't have an account? <a href="register.html" class="text-primary fw-bold">Sign up</a>
                </p>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <!-- <footer class="footer mt-auto">
    <div class="container">
      <div class="footer-bottom p-0 border-0">
        <p class="mb-0">&copy; 2026 Mountain Expedition. All rights reserved.</p>
      </div>
    </div>
  </footer> -->

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom JS -->
  <script src="assets/js/main.js"></script>
</body>

</html>
