        </li>

  <!-- Registration Section -->
  <main class="flex-grow-1 d-flex align-items-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="card p-4">
            <div class="text-center mb-4">
              <a href="index.html"
                class="d-flex align-items-center justify-content-center gap-2 mb-3 text-decoration-none">
                <img src="assets/images/logo.png" alt="Logo" style="height: 40px;">
              </a>
              <h2 class="mb-2">Create Account</h2>
              <p class="text-secondary">Join us and start your expedition journey</p>
            </div>

            <form data-validate action="dashboard/index.html" method="GET">
              <div class="form-group mb-3">
                <label for="fullname" class="form-label">Full Name</label>
                <input type="text" id="fullname" class="form-control" placeholder="John Doe" required>
              </div>

              <div class="form-group mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
              </div>

              <div class="form-group mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Create a password" required
                  minlength="8">
              </div>

              <div class="form-group mb-4">
                <label for="confirm-password" class="form-label">Confirm Password</label>
                <input type="password" id="confirm-password" class="form-control" placeholder="Confirm your password"
                  required minlength="8">
              </div>

              <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" value="" id="terms" required>
                <label class="form-check-label" for="terms">
                  I agree to the <a href="#" class="text-primary">Terms of Service</a> & <a href="#"
                    class="text-primary">Privacy Policy</a>
                </label>
              </div>

              <button type="submit" class="btn btn-primary w-100 py-3 mb-3">Create Account</button>

              <div class="text-center mb-3">
                <span class="text-secondary small fw-medium">OR</span>
              </div>

              <div class="d-grid gap-2 mb-4">
                <button type="button"
                  class="btn btn-outline w-100 d-flex align-items-center justify-content-center gap-2">
                  <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="Google">
                  Continue with Google
                </button>
                <button type="button"
                  class="btn btn-outline w-100 d-flex align-items-center justify-content-center gap-2"
                  style="border-color: #1877f2; color: #1877f2;">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
                    viewBox="0 0 16 16">
                    <path
                      d="M16 8.049c0-4.446-3.582-8.05-8-8.05C3.58 0-.002 3.603-.002 8.05c0 4.017 2.926 7.347 6.75 7.951v-5.625h-2.03V8.05H6.75V6.275c0-2.017 1.195-3.131 3.022-3.131.876 0 1.791.157 1.791.157v1.98h-1.009c-.993 0-1.303.621-1.303 1.258v1.51h2.218l-.354 2.326H9.25V16c3.824-.604 6.75-3.934 6.75-7.951z" />
                  </svg>
                  Continue with Facebook
                </button>
              </div>

              <div class="text-center mt-3">
                <p class="mb-0">Already have an account? <a href="login.html" class="text-primary fw-bold">Login
                    here</a></p>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
